<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio de Sesión | Panadería Chelo</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h1>PANADERÍA CHELO</h1>
      <p>Sistema Contable</p>

      <form id="loginForm">
        <input type="text" id="loginUsuario" class="input" placeholder="Usuario" autocomplete="username" />
        <input type="password" id="loginContrasena" class="input" placeholder="Contraseña" autocomplete="current-password" />
        <button type="submit" class="btn-login">Ingresar</button>
      </form>

      <div id="loginMensaje" class="mensaje"></div>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
